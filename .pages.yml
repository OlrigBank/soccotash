media:
- name: images
  label: Images
  input: site/public/media/images
  output: /media/images
  extensions:
  - png
  - jpg
  - jpeg
  - webp
  - svg
  rename: safe
content:
- name: local-guide
  label: Local guide
  type: collection
  path: site/src/content/local-guide
  format: yaml-frontmatter
  filename: '{slug}.md'
  view:
    fields:
    - title
    - category
    - recommended
    primary: title
    sort:
    - title
    - category
    search:
    - title
    - summary
    - body
    default:
      sort: title
      order: asc
  fields:
  - name: title
    label: Title
    type: string
    required: true
  - name: slug
    label: URL slug
    type: string
    required: true
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  - name: legacyId
    label: Legacy ID
    type: string
    readonly: true
  - name: category
    label: Category
    type: select
    required: true
    options:
      values:
      - name: home
        label: Home
      - name: whats-on
        label: What’s on
      - name: outdoor-pursuits
        label: Outdoor pursuits
      - name: close-to-home
        label: Close to home
      - name: further-afield
        label: Further afield
      - name: cycling
        label: Cycling
      - name: local
        label: In Kendal
      - name: eating-out
        label: Eating out
      - name: bars
        label: Bars
      - name: activities
        label: Activities
      - name: exhibitions
        label: Arts and exhibitions
      - name: shopping
        label: Shopping
      - name: music
        label: Music
      - name: pre-owned
        label: Antiques and pre-owned
      - name: antiques
        label: Antiques
      - name: collectables
        label: Collectables
      - name: festivals
        label: Festivals
  - name: categoryLabel
    label: Legacy category label
    type: string
    hidden: true
  - name: image
    label: Image
    type: image
  - name: externalLink
    label: External website
    type: string
  - name: recommended
    label: Recommended / featured
    type: boolean
  - name: summary
    label: Card summary
    type: text
  - name: legacyText
    label: Legacy text
    type: text
    hidden: true
  - name: body
    label: Page body
    type: rich-text
- name: pages
  label: General pages
  type: collection
  path: site/src/content/pages
  format: yaml-frontmatter
  filename: '{slug}.md'
  view:
    fields:
    - title
    - slug
    primary: title
    sort:
    - title
    search:
    - title
    - description
    - body
  fields:
  - name: slug
    label: Internal slug
    type: string
    required: true
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  - name: title
    label: Title
    type: string
    required: true
  - name: description
    label: Meta description
    type: text
  - name: heroTitle
    label: Hero title
    type: string
  - name: heroText
    label: Hero text
    type: text
  - name: body
    label: Page body
    type: rich-text
- name: listings
  label: Listings
  type: collection
  path: site/src/content/listings
  format: yaml-frontmatter
  filename: '{slug}.md'
  view:
    fields:
    - title
    - sleeps
    - sortOrder
    - featured
    primary: title
    sort:
    - sortOrder
    - title
    search:
    - title
    - tagline
    - summary
    - locationSummary
    - body
    default:
      sort: sortOrder
      order: asc
  fields:
  - name: title
    label: Title
    type: string
    required: true
  - name: slug
    label: URL slug
    type: string
    required: true
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  - name: tagline
    label: Tagline
    type: string
  - name: summary
    label: Summary
    type: text
  - name: image
    label: Main image
    type: image
  - name: gallery
    label: Gallery
    type: image
    list: true
  - name: sleeps
    label: Sleeps display text
    type: string
  - name: bedrooms
    label: Bedrooms display text
    type: string
  - name: bathrooms
    label: Bathrooms display text
    type: string
  - name: standardGuests
    label: Standard number of guests
    type: number
  - name: maximumGuests
    label: Maximum number of guests
    type: number
  - name: bedroomCount
    label: Bedroom count
    type: number
  - name: bedCount
    label: Bed count
    type: number
  - name: bathroomCount
    label: Bathroom count
    type: number
  - name: wcCount
    label: WC / toilet count
    type: number
  - name: highlights
    label: Highlights
    type: string
    list: true
  - name: guestAccess
    label: Guest access
    type: text
  - name: sharedSpaces
    label: Shared spaces
    type: text
  - name: locationSummary
    label: Location summary
    type: text
  - name: parking
    label: Parking
    type: text
  - name: accessInformation
    label: Access information
    type: text
  - name: importantNotes
    label: Important notes
    type: text
  - name: amenities
    label: Amenities
    type: string
    list: true
  - name: houseRules
    label: House rules
    type: string
    list: true
  - name: airbnbUrl
    label: Airbnb listing URL
    type: string
    pattern: ^https?://.+$
  - name: spaces
    label: Spaces used by this listing
    type: reference
    options:
      collection: spaces
      multiple: true
      search: title,summary,spaceType,spaceGroup
      value: '{fields.slug}'
      label: '{primary}'
  - name: sortOrder
    label: Sort order
    type: number
  - name: featured
    label: Featured
    type: boolean
  - name: body
    label: Listing introduction
    type: rich-text
- name: spaces
  label: Spaces
  type: collection
  path: site/src/content/spaces
  subfolders: true
  format: yaml-frontmatter
  filename: '{spaceGroup}/{slug}/{slug}.md'
  view:
    fields:
    - title
    - spaceGroup
    - spaceType
    - floor
    - sortOrder
    - featured
    primary: title
    sort:
    - spaceGroup
    - sortOrder
    - title
    search:
    - title
    - summary
    - spaceType
    - floor
    - features
    - body
    default:
      sort: sortOrder
      order: asc
  fields:
  - name: title
    label: Title
    type: string
    required: true
  - name: slug
    label: Slug
    type: string
    required: true
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  - name: spaceGroup
    label: Folder group
    type: select
    required: true
    options:
      values:
      - name: house
        label: House
      - name: cottage
        label: Cottage
      - name: garden
        label: Garden
  - name: spaceType
    label: Space type
    type: select
    options:
      values:
      - name: bedroom
        label: Bedroom
      - name: bathroom
        label: Bathroom / WC
      - name: kitchen
        label: Kitchen
      - name: lounge
        label: Lounge
      - name: dining
        label: Dining
      - name: entrance
        label: Entrance / hall
      - name: landing
        label: Landing
      - name: mezzanine
        label: Mezzanine
      - name: garden
        label: Garden
      - name: other
        label: Other
  - name: summary
    label: Summary
    type: text
  - name: image
    label: Main image
    type: image
  - name: gallery
    label: Gallery
    type: image
    list: true
  - name: floor
    label: Floor / level
    type: select
    options:
      values:
      - name: ground
        label: Ground floor
      - name: first
        label: First floor
      - name: split-level
        label: Split level
      - name: outdoor
        label: Outdoor
  - name: sleeps
    label: Sleeps
    type: number
  - name: beds
    label: Number of beds
    type: number
  - name: bedTypes
    label: Bed configuration
    type: string
    list: true
  - name: bathrooms
    label: Number of bathrooms
    type: number
  - name: toilets
    label: Number of toilets / WCs
    type: number
  - name: ensuite
    label: Ensuite
    type: boolean
  - name: shared
    label: May be shared between separate bookings
    type: boolean
  - name: views
    label: Views
    type: string
    list: true
  - name: features
    label: Features
    type: string
    list: true
  - name: accessInformation
    label: Access information
    type: text
  - name: sortOrder
    label: Sort order
    type: number
  - name: featured
    label: Featured
    type: boolean
  - name: body
    label: Space description
    type: rich-text
- name: settings
  label: Settings
  type: group
  items:
  - name: site-settings
    label: Site settings
    type: file
    path: site/src/data/settings/site.yml
    format: yaml
    fields:
    - name: title
      label: Site title
      type: string
      required: true
    - name: description
      label: Site description
      type: text
    - name: url
      label: Public URL
      type: string
    - name: logo
      label: Logo / default image
      type: image
  - name: contact-settings
    label: Contact details
    type: file
    path: site/src/data/settings/contact.yml
    format: yaml
    fields:
    - name: name
      label: Contact name
      type: string
      required: true
    - name: email
      label: Email
      type: string
    - name: phone
      label: Phone
      type: string
    - name: whatsapp
      label: WhatsApp
      type: string
    - name: address
      label: Address
      type: text
  - name: navigation
    label: Navigation structure
    type: file
    path: site/src/data/navigation/main.yml
    format: code
    fields: []
