databases:
  - name: soccotash-bookings
    databaseName: soccotash
    user: soccotash
    region: frankfurt
    plan: free

services:
  - type: web
    name: soccotash
    runtime: docker
    rootDir: site
    autoDeployTrigger: off
    region: frankfurt
    plan: starter
    renderSubdomainPolicy: enabled

    envVars:
      - key: PORT
        value: "8080"

      - key: DATABASE_URL
        fromDatabase:
          name: soccotash-bookings
          property: connectionString

      - key: DATABASE_SSL
        value: "true"

      - key: AIRBNB_MAIN_HOUSE_ICAL_URLS
        sync: false

      - key: AIRBNB_COTTAGE_ICAL_URLS
        sync: false

      - key: CALENDAR_SYNC_TOKEN
        sync: false

      - key: BOOKING_SERVICE_URL
        fromService:
          type: web
          name: soccotash
          envVarKey: RENDER_EXTERNAL_URL

    healthCheckPath: /api/health/