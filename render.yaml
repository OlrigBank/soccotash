databases:
  - name: soccotash-bookings
    databaseName: soccotash
    user: soccotash
    region: frankfurt
    plan: free

services:
  - type: web
    name: soccotash
    runtime: docker
    rootDir: site
    autoDeployTrigger: off
    region: frankfurt
    plan: starter
    renderSubdomainPolicy: enabled

    envVars:
      - key: PORT
        value: "8080"

      - key: DATABASE_URL
        fromDatabase:
          name: soccotash-bookings
          property: connectionString

      - key: DATABASE_SSL
        value: "true"

      - key: AIRBNB_MAIN_HOUSE_ICAL_URLS
        sync: false

      - key: AIRBNB_COTTAGE_ICAL_URLS
        sync: false

      - key: CALENDAR_SYNC_TOKEN
        sync: false

      - key: BOOKING_SERVICE_URL
        fromService:
          type: web
          name: soccotash
          envVarKey: RENDER_EXTERNAL_URL

      # Customer booking-offer emails are sent through the Resend HTTPS API.
      # This is a fixed, non-secret setting and can safely remain in render.yaml.
      - key: EMAIL_PROVIDER
        value: resend

      # Secret API key generated in the Resend dashboard.
      # Enter the value in Render when creating or updating the Blueprint.
      # Never place the actual API key in render.yaml or commit it to GitHub.
      - key: RESEND_API_KEY
        sync: false

      # Address shown in the From field of customer emails.
      # The domain must be verified in Resend, except when using Resend's
      # restricted testing sender.
      # Example: Olrig Bank <bookings@olrigbank.co.uk>
      - key: BOOKING_EMAIL_FROM
        sync: false

    healthCheckPath: /api/health/