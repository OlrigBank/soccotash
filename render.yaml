databases:
  - name: soccotash-bookings
    databaseName: soccotash
    user: soccotash
    region: frankfurt
    plan: free

services:
  - type: web
    name: soccotash
    runtime: docker
    rootDir: site
    autoDeployTrigger: off
    region: frankfurt
    plan: starter
    renderSubdomainPolicy: enabled

    envVars:
      - key: PORT
        value: "8080"

      - key: DATABASE_URL
        fromDatabase:
          name: soccotash-bookings
          property: connectionString

      - key: DATABASE_SSL
        value: "true"

      - key: AIRBNB_MAIN_HOUSE_ICAL_URLS
        sync: false

      - key: AIRBNB_COTTAGE_ICAL_URLS
        sync: false

      - key: CALENDAR_SYNC_TOKEN
        sync: false

      - key: BOOKING_SERVICE_URL
        fromService:
          type: web
          name: soccotash
          envVarKey: RENDER_EXTERNAL_URL

      # Customer booking-offer email. SMTP and Resend are both supported.
      - key: EMAIL_PROVIDER
        sync: false
      - key: BOOKING_EMAIL_FROM
        sync: false
      - key: BOOKING_EMAIL_REPLY_TO
        sync: false
      - key: BOOKING_EMAIL_BCC
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_TLS_REJECT_UNAUTHORIZED
        sync: false
      - key: RESEND_API_KEY
        sync: false

    healthCheckPath: /api/health/